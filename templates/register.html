<!DOCTYPE html>
<html lang="en">
<head>
    <title>Register - Expense Tracker</title>
      <link rel="icon" href="{{ url_for('static', filename='favicon.ico') }}">
    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

    <!-- Icons -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons/font/bootstrap-icons.css" rel="stylesheet">

    <!-- Particles -->
    <script src="https://cdn.jsdelivr.net/npm/particles.js"></script>

    <style>
        #particles-js {
            position: fixed;
            width: 100%;
            height: 100%;
            z-index: -1;
        }

        .glass-card {
            backdrop-filter: blur(15px);
            background: rgba(255, 255, 255, 0.15);
            border-radius: 20px;
            padding: 20px;
        }

        /* 🔥 FIXED INPUT DESIGN */
        .form-control {
            background: rgba(255,255,255,0.9);
            color: black !important;
            border: none;
        }

        .form-control::placeholder {
            color: #555;
        }

        .input-group-text {
            background: rgba(255,255,255,0.9) !important;
            color: black !important;
            border: none;
        }

        label {
            color: black;
            font-weight: 500;
        }

        .btn-custom {
            background: linear-gradient(45deg, #00c6ff, #0072ff);
            color: white;
            font-weight: bold;
            transition: 0.3s;
        }

        .btn-custom:hover {
            transform: scale(1.05);
            box-shadow: 0 0 15px rgba(0,114,255,0.7);
        }
    </style>
</head>

<body class="d-flex align-items-center justify-content-center">

<div id="particles-js"></div>

<div class="card glass-card shadow-lg" style="width: 380px;">

    <h3 class="text-center mb-2">📝 Create Account</h3>
    <p class="text-center text-dark">Join Expense Tracker 🚀</p>

    {% if error %}
    <div class="alert alert-danger text-center py-2">
        {{ error }}
    </div>
    {% endif %}

    <form method="POST" onsubmit="return validateForm()">

        <!-- Username -->
        <div class="mb-3">
            <label>Username</label>
            <div class="input-group">
                <span class="input-group-text">
                    <i class="bi bi-person"></i>
                </span>
                <input type="text" name="username" class="form-control" placeholder="Enter username" required>
            </div>
        </div>

        <!-- Password -->
        <div class="mb-3">
            <label>Password</label>
            <div class="input-group">
                <span class="input-group-text">
                    <i class="bi bi-lock"></i>
                </span>
                <input type="password" id="password" name="password" class="form-control" placeholder="Enter password" required>

                <span class="input-group-text" onclick="togglePassword()" style="cursor:pointer;">
                    <i class="bi bi-eye" id="eye1"></i>
                </span>
            </div>
        </div>

        <!-- Confirm Password -->
        <div class="mb-3">
            <label>Confirm Password</label>
            <div class="input-group">
                <span class="input-group-text">
                    <i class="bi bi-shield-lock"></i>
                </span>
                <input type="password" id="confirm" class="form-control" placeholder="Confirm password" required>

                <span class="input-group-text" onclick="toggleConfirm()" style="cursor:pointer;">
                    <i class="bi bi-eye" id="eye2"></i>
                </span>
            </div>
        </div>

        <!-- Button -->
        <div class="d-grid">
            <button class="btn btn-custom">Register</button>
        </div>

    </form>

    <div class="text-center mt-3">
        <small>Already have an account? 
            <a href="/login" class="fw-bold text-primary">Login</a>
        </small>
    </div>

</div>

<script>
particlesJS("particles-js", {
  particles: {
    number: { value: 60 },
    move: { speed: 2 },
    line_linked: { enable: true }
  }
});

// Toggle password
function togglePassword() {
    let p = document.getElementById("password");
    let icon = document.getElementById("eye1");

    if (p.type === "password") {
        p.type = "text";
        icon.classList.replace("bi-eye", "bi-eye-slash");
    } else {
        p.type = "password";
        icon.classList.replace("bi-eye-slash", "bi-eye");
    }
}

// Toggle confirm password
function toggleConfirm() {
    let c = document.getElementById("confirm");
    let icon = document.getElementById("eye2");

    if (c.type === "password") {
        c.type = "text";
        icon.classList.replace("bi-eye", "bi-eye-slash");
    } else {
        c.type = "password";
        icon.classList.replace("bi-eye-slash", "bi-eye");
    }
}

// Validation
function validateForm() {
    let p = document.getElementById("password").value;
    let c = document.getElementById("confirm").value;

    if (p !== c) {
        alert("❌ Passwords do not match!");
        return false;
    }
    return true;
}
</script>

</body>
</html>
