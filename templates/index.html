<!DOCTYPE html>
<html>
<head>
<title>FinTrack Dashboard</title>
  <link rel="icon" href="{{ url_for('static', filename='favicon.ico') }}">

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>
body {
    background: linear-gradient(135deg,#1e3c72,#2a5298);
    color: white;
}

/* Sidebar */
.sidebar {
    position: fixed;
    height: 100%;
    width: 200px;
    background: rgba(0,0,0,0.3);
    padding-top: 20px;
}

.sidebar a {
    display: block;
    color: white;
    padding: 10px;
    text-decoration: none;
}

.sidebar a:hover {
    background: rgba(255,255,255,0.2);
}

/* Content */
.content {
    margin-left: 210px;
    padding: 20px;
}

/* Glass */
.glass {
    background: rgba(255,255,255,0.1);
    border-radius: 15px;
    padding: 20px;
    backdrop-filter: blur(10px);
}

/* Buttons */
.btn-delete {
    background: red;
    color: white;
}
.btn-edit {
    background: orange;
    color: white;
}
</style>

</head>

<body>

<!-- 🔥 SIDEBAR -->
<div class="sidebar">
    <h4 class="text-center">💰 FinTrack</h4>
    <a href="/">Dashboard</a>
    <a href="/add">Add Transaction</a>
    <a href="/logout">Logout</a>
</div>

<div class="content">

<!-- 🔍 FILTER -->
<div class="glass mb-3">
    <form method="GET" class="row g-2">

        <div class="col-md-4">
            <input type="text" name="search" class="form-control" placeholder="Search category">
        </div>

        <div class="col-md-4">
            <input type="month" name="month" class="form-control">
        </div>

        <div class="col-md-4">
            <button class="btn btn-primary w-100">Filter</button>
        </div>

    </form>
</div>

<!-- 🔥 CARDS -->
<div class="row text-center">

    <div class="col-md-4">
        <div class="glass">
            <h5>Income</h5>
            <h3 class="text-success">₹{{ income }}</h3>
        </div>
    </div>

    <div class="col-md-4">
        <div class="glass">
            <h5>Expense</h5>
            <h3 class="text-danger">₹{{ expense }}</h3>
        </div>
    </div>

    <div class="col-md-4">
        <div class="glass">
            <h5>Balance</h5>
            <h3 class="text-info">₹{{ balance }}</h3>
        </div>
    </div>

</div>

<!-- 📊 CHARTS -->
<div class="row mt-4">

    <div class="col-md-6">
        <div class="glass">
            <canvas id="pieChart"></canvas>
        </div>
    </div>

    <div class="col-md-6">
        <div class="glass">
            <canvas id="categoryChart"></canvas>
        </div>
    </div>

</div>

<!-- 📋 TABLE -->
<div class="glass mt-4">
    <h5>Transactions</h5>

    <table class="table table-dark text-center">
        <thead>
            <tr>
                <th>Type</th>
                <th>Amount</th>
                <th>Category</th>
                <th>Date</th>
                <th>Action</th>
            </tr>
        </thead>

        <tbody>
            {% for row in data %}
            <tr>
                <td>{{ row[2] }}</td>
                <td>₹{{ row[3] }}</td>
                <td>{{ row[4] }}</td>
                <td>{{ row[5] }}</td>
                <td>
                    <a href="/edit/{{ row[0] }}" class="btn btn-edit btn-sm">Edit</a>
                    <a href="/delete/{{ row[0] }}" class="btn btn-delete btn-sm">Delete</a>
                </td>
            </tr>
            {% endfor %}
        </tbody>
    </table>
</div>

</div>

<script>
new Chart(document.getElementById("pieChart"), {
    type: "pie",
    data: {
        labels: ["Income","Expense"],
        datasets: [{
            data: [{{ income }}, {{ expense }}],
            backgroundColor: ["green","red"]
        }]
    }
});

new Chart(document.getElementById("categoryChart"), {
    type: "doughnut",
    data: {
        labels: {{ categories|tojson }},
        datasets: [{
            data: {{ amounts|tojson }}
        }]
    }
});
</script>

</body>
</html>
