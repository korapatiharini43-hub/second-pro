<!DOCTYPE html>
<html>
<head>
    <title>Add Transaction - FinTrack</title>
      <link rel="icon" href="{{ url_for('static', filename='favicon.ico') }}">

    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>
        body {
            background: linear-gradient(135deg,#1e3c72,#2a5298);
            height: 100vh;
        }

        .glass-card {
            backdrop-filter: blur(15px);
            background: rgba(255,255,255,0.15);
            border-radius: 15px;
            padding: 25px;
            color: white;
        }

        .form-control, .form-select {
            background: rgba(255,255,255,0.9);
            color: black;
            border: none;
        }

        .btn-custom {
            background: linear-gradient(45deg,#00c6ff,#0072ff);
            color: white;
            font-weight: bold;
            transition: 0.3s;
        }

        .btn-custom:hover {
            transform: scale(1.05);
            box-shadow: 0 0 15px rgba(0,114,255,0.7);
        }
    </style>
</head>

<body class="d-flex align-items-center justify-content-center">

<div class="card glass-card shadow-lg" style="width: 400px;">

    <h3 class="text-center mb-3">➕ Add Transaction</h3>

    <form method="POST">

        <!-- Amount -->
        <div class="mb-3">
            <label class="form-label">Amount</label>
            <input type="number" name="amount" class="form-control" placeholder="Enter amount" required>
        </div>

        <!-- Category -->
        <div class="mb-3">
            <label class="form-label">Category</label>
            <input type="text" name="category" class="form-control" placeholder="e.g. Food, Salary" required>
        </div>

        <!-- Type -->
        <div class="mb-3">
            <label class="form-label">Transaction Type</label>
            <select name="type" class="form-select">
                <option value="income">Income</option>
                <option value="expense">Expense</option>
            </select>
        </div>

        <!-- Buttons -->
        <div class="d-grid">
            <button class="btn btn-custom">Add Transaction</button>
        </div>

    </form>

    <!-- Back Button -->
    <div class="text-center mt-3">
        <a href="/" class="text-light">⬅ Back to Dashboard</a>
    </div>

</div>

</body>
</html>
