<!DOCTYPE html>
<html lang="en">
<head>
    <title>FinTrack | Smart Expense Manager</title>
   <link rel="icon" href="{{ url_for('static', filename='favicon.ico') }}">

    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

    <!-- Icons -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons/font/bootstrap-icons.css" rel="stylesheet">

    <!-- Particles -->
    <script src="https://cdn.jsdelivr.net/npm/particles.js"></script>

    <style>
        body {
            margin: 0;
            height: 100vh;
            overflow: hidden;
        }

        /* 🌌 Animated Background */
        #particles-js {
            position: fixed;
            width: 100%;
            height: 100%;
            z-index: -1;
            background: linear-gradient(135deg, #141e30, #243b55);
        }

        /* 🧊 Glass Card */
        .glass-card {
            backdrop-filter: blur(20px);
            background: rgba(255, 255, 255, 0.12);
            border-radius: 20px;
            padding: 30px;
            width: 360px;
            color: white;
            box-shadow: 0 10px 40px rgba(0,0,0,0.4);
            animation: fadeIn 1s ease;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(30px);}
            to { opacity: 1; transform: translateY(0);}
        }

        /* Inputs */
        .form-control {
            background: rgba(255,255,255,0.9);
            color: black !important;
            border: none;
        }

        .input-group-text {
            background: rgba(255,255,255,0.9);
            color: black;
            border: none;
        }

        label {
            color: #eee;
        }

        /* Button */
        .login-btn {
            background: linear-gradient(45deg,#00c6ff,#0072ff);
            color: white;
            font-weight: bold;
            transition: 0.3s;
            border: none;
        }

        .login-btn:hover {
            transform: scale(1.05);
            box-shadow: 0 0 20px rgba(0,114,255,0.7);
        }

        /* Branding */
        .brand {
            font-size: 26px;
            font-weight: bold;
            text-align: center;
        }

        .tagline {
            font-size: 13px;
            text-align: center;
            color: #ccc;
        }
    </style>
</head>

<body class="d-flex align-items-center justify-content-center">

<div id="particles-js"></div>

<div class="glass-card">

    <!-- Branding -->
    <div class="brand">💰  WELCOME</div>
    <div class="tagline mb-3">Smart Expense Management System</div>

    <!-- Error -->
    {% if error %}
    <div class="alert alert-danger text-center py-2">
        {{ error }}
    </div>
    {% endif %}

    <!-- Form -->
    <form method="POST" onsubmit="showLoader()">

        <!-- Username -->
        <div class="mb-3">
            <label>Username</label>
            <div class="input-group">
                <span class="input-group-text"><i class="bi bi-person"></i></span>
                <input type="text" name="username" class="form-control" placeholder="Enter username" required>
            </div>
        </div>

        <!-- Password -->
        <div class="mb-2">
            <label>Password</label>
            <div class="input-group">
                <span class="input-group-text"><i class="bi bi-lock"></i></span>
                <input type="password" id="password" name="password" class="form-control" placeholder="Enter password" required>

                <span class="input-group-text" onclick="togglePassword()" style="cursor:pointer;">
                    <i class="bi bi-eye" id="eyeIcon"></i>
                </span>
            </div>
        </div>

        <!-- Forgot
        <div class="text-end mb-3">
            <a href="#" class="text-light small">Forgot password?</a>
        </div> -->

        <!-- Button -->
        <div class="d-grid">
            <button id="loginBtn" class="btn login-btn">Login</button>
        </div>

    </form>

    <!-- Register -->
    <div class="text-center mt-3">
        <small>Don't have an account? 
            <a href="/register" class="text-info fw-bold">Register</a>
        </small>
    </div>

</div>

<script>
/* 🌌 Interactive Particles (cursor reacts) */
particlesJS("particles-js", {
  particles: {
    number: { value: 80 },
    size: { value: 3 },
    move: { speed: 2 },
    line_linked: { enable: true }
  },
  interactivity: {
    events: {
      onhover: { enable: true, mode: "repulse" }, // 👈 reacts to cursor
      onclick: { enable: true, mode: "push" }
    },
    modes: {
      repulse: { distance: 100 },
      push: { particles_nb: 4 }
    }
  }
});

/* 👁️ Toggle Password */
function togglePassword() {
    let pass = document.getElementById("password");
    let icon = document.getElementById("eyeIcon");

    if (pass.type === "password") {
        pass.type = "text";
        icon.classList.replace("bi-eye", "bi-eye-slash");
    } else {
        pass.type = "password";
        icon.classList.replace("bi-eye-slash", "bi-eye");
    }
}

/* ⏳ Loading Button */
function showLoader() {
    let btn = document.getElementById("loginBtn");
    btn.innerHTML = "Logging in...";
    btn.disabled = true;
}
</script>

</body>
</html>
